{{define "sms_thread_content"}}
{{$t := .Tenant}}
<div class="row">
  <h1 style="margin:0">{{.Peer}} <span class="muted">↔ {{.Our}}</span></h1>
  <a href="/admin/tenants/{{$t.ID}}/sms">← all conversations</a>
</div>

<section class="card" style="margin-top:1rem">
  {{if .Messages}}
  <div class="bubbles">
    {{range .Messages}}
    <div class="bubble-row {{if eq .Direction "outbound"}}out{{else}}in{{end}}">
      <div class="bubble {{if eq .Direction "outbound"}}out{{else}}in{{end}}">{{.Body}}</div>
      <div class="muted" style="font-size:0.75rem">{{.CreatedAt.Format "2006-01-02 15:04"}}{{if eq .Direction "outbound"}} · {{.Status}}{{end}}</div>
    </div>
    {{end}}
  </div>
  {{else}}<p class="muted">No messages in this thread.</p>{{end}}
</section>

<section class="card" style="margin-top:1rem">
  <form method="post" action="/admin/tenants/{{$t.ID}}/sms/send">
    <input type="hidden" name="our" value="{{.Our}}">
    <input type="hidden" name="peer" value="{{.Peer}}">
    <label>Reply<textarea name="body" rows="2" required></textarea></label>
    <button type="submit">Queue reply</button>
  </form>
</section>
{{end}}
