{{define "wallboard_page"}}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0d1117">
  <title>{{.TenantName}} · Wallboard</title>
  <style>
    :root { --bg:#0d1117; --panel:#161b22; --line:#30363d; --fg:#e6edf3; --muted:#8b949e;
            --blue:#58a6ff; --green:#3fb950; --amber:#d29922; --red:#f85149; }
    * { box-sizing:border-box; }
    html, body { margin:0; height:100%; }
    body { background:var(--bg); color:var(--fg); font:18px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
           min-height:100vh; padding:1.4rem 1.6rem; }
    header { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:1.2rem; }
    header .t { font-size:1.8rem; font-weight:800; letter-spacing:-0.01em; }
    header .sub { color:var(--muted); font-size:0.85rem; }
    a { color:var(--blue); text-decoration:none; }

    .tiles { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:1rem; margin-bottom:1.2rem; }
    .tile { background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:1.1rem 1.2rem; }
    .tile .k { color:var(--muted); font-size:0.75rem; text-transform:uppercase; letter-spacing:0.06em; }
    .tile .v { font-size:2.6rem; font-weight:800; font-variant-numeric:tabular-nums; line-height:1.1; margin-top:0.2rem; }
    .tile .v small { font-size:1.1rem; color:var(--muted); font-weight:600; }
    .tile.green .v { color:var(--green); }
    .tile.amber .v { color:var(--amber); }
    .tile.blue .v { color:var(--blue); }

    .panels { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:1rem; }
    .panel { background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:1rem 1.1rem; }
    .panel h2 { margin:0 0 0.7rem; font-size:0.85rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--muted); }
    table { width:100%; border-collapse:collapse; font-size:0.92rem; }
    th, td { text-align:left; padding:0.35rem 0.5rem; border-bottom:1px solid var(--line); }
    th { color:var(--muted); font-weight:600; font-size:0.72rem; text-transform:uppercase; letter-spacing:0.04em; }
    tr:last-child td { border-bottom:none; }
    .num { text-align:right; font-variant-numeric:tabular-nums; }
    .pill { display:inline-block; padding:0.05rem 0.5rem; border-radius:999px; font-size:0.78rem; font-weight:600; }
    .pill.on { background:rgba(63,185,80,.15); color:var(--green); }
    .pill.off { background:rgba(139,148,158,.15); color:var(--muted); }
    .muted { color:var(--muted); }
    .empty { color:var(--muted); padding:0.6rem 0.5rem; }
    .dim { opacity:.6; }
  </style>
</head>
<body>
  <header>
    <div class="t">{{.TenantName}} <span class="muted" style="font-weight:600">Wallboard</span></div>
    <div class="sub">auto-refreshing · <a href="/admin/tenants/{{.TenantID}}">portal</a></div>
  </header>

  <div id="wallboard"
       hx-get="/admin/tenants/{{.TenantID}}/wallboard/fragment"
       hx-trigger="load, every 5s"
       hx-swap="innerHTML"
       aria-live="polite">
    <p class="muted">Loading…</p>
  </div>

  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</body>
</html>
{{end}}
