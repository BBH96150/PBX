{{define "queue_board_content"}}
{{$t := .Tenant}}
<div class="row">
  <h1 style="margin:0">{{$t.Name}} <span class="muted">· Queue board</span></h1>
  <span class="muted">auto-refreshing every 2s</span>
</div>
{{template "tenant_subnav" .}}

<section class="card" style="margin-top:1rem">
  <div id="queue-board"
       hx-get="/admin/tenants/{{$t.ID}}/queues-live/fragment"
       hx-trigger="load, every 2s"
       hx-swap="innerHTML"
       aria-live="polite">
    <p class="muted">Loading live queue state…</p>
  </div>
</section>
{{end}}
