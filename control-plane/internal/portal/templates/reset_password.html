{{define "reset_password"}}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Set new password · SIP Platform</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    body { display: grid; place-items: center; min-height: 100vh; padding: 1rem; }
    main { width: 100%; max-width: 26rem; }
  </style>
</head>
<body>
<main>
  <h1>Choose a new password</h1>
  <p class="muted">Minimum 8 characters.</p>
  {{if .Flash}}<article class="contrast">{{.Flash}}</article>{{end}}
  <form method="post" action="/admin/reset-password/{{.Token}}">
    <label>New password
      <input type="password" name="password" autocomplete="new-password" minlength="8" required autofocus>
    </label>
    <label>Confirm password
      <input type="password" name="password_confirm" autocomplete="new-password" minlength="8" required>
    </label>
    <button type="submit">Update password</button>
  </form>
  <p style="margin-top:1rem"><a href="/admin/login">Back to sign in</a></p>
</main>
</body>
</html>
{{end}}
