version: "2"
run:
  timeout: 5m
linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
  settings:
    staticcheck:
      # Keep SA (correctness) and S (simplification). Drop:
      #   QF*  — quick-fix suggestions (cosmetic, e.g. De Morgan)
      #   ST*  — stylecheck (package comments, godoc preamble format,
      #          IDP vs IdP initialism conventions). Useful for a public
      #          library, mostly noise for an application.
      checks: ["all", "-QF*", "-ST*"]
  exclusions:
    rules:
      # _test.go files: errcheck on assertions is just noise.
      - path: _test\.go
        linters: [errcheck]
      # Unchecked deferred Close() on fs/network/smtp handles is idiomatic
      # Go — the close happens during stack unwind and any error there
      # isn't actionable.
      - source: 'defer .*\.Close\(\)'
        linters: [errcheck]
