name: Ops · disk

# Manually-triggered disk diagnosis + safe cleanup for the Hetzner box.
# Uses the same SSH secrets the deploy job already uses — no console, no new
# key. Run with clean=no first to see the breakdown; then clean=yes to apply
# the non-destructive cleanups (systemd journal vacuum, container log
# truncation, apt cache). It never touches Postgres data, named volumes, or
# /var/backups — those are surfaced for a human to decide on.
on:
  workflow_dispatch:
    inputs:
      clean:
        description: "Type 'yes' to run safe cleanups (journal/container-logs/apt). Default diagnoses only."
        required: false
        default: "no"
      harden:
        description: "Type 'yes' to install a global Docker log-size limit (50m x3) and restart docker."
        required: false
        default: "no"
      recreate:
        description: "Type 'yes' to force-recreate all compose containers so they adopt the log cap (brief downtime)."
        required: false
        default: "no"
      show_compose:
        description: "Type 'yes' to print the on-box docker-compose.yml (to diff against the repo)."
        required: false
        default: "no"
      apply_vm_override:
        description: "Type 'yes' to add the freeswitch_storage volume via docker-compose.override.yml (fixes voicemail recordings on prod)."
        required: false
        default: "no"
      check_env:
        description: "Type 'yes' to check whether prod .env overrides the compose default credentials (reports status only, never values)."
        required: false
        default: "no"
      rotate_esl:
        description: "Type 'yes' to rotate the FreeSWITCH ESL password to a fresh secret (restarts FS + control-plane; auto-rolls-back if it can't reconnect)."
        required: false
        default: "no"
      diag_esl:
        description: "Type 'yes' for a read-only ESL diagnosis (current connection state + how FS resolves the password expression). No restart."
        required: false
        default: "no"
      audit_net:
        description: "Type 'yes' for a read-only network-exposure audit (host listening ports + firewall). No changes."
        required: false
        default: "no"
      fix_redis_bind:
        description: "Type 'yes' to bind Redis to 127.0.0.1 (it currently publishes to 0.0.0.0; recreates redis)."
        required: false
        default: "no"
      compose_apply:
        description: "Type 'yes' to run `docker compose up -d` on the box (applies the synced override; recreates only services whose config changed)."
        required: false
        default: "no"

jobs:
  disk:
    runs-on: ubuntu-latest
    concurrency:
      # Share the deploy lock so this never races a deploy on the box.
      group: deploy-hetzner
      cancel-in-progress: false
    steps:
      - name: Install SSH key
        run: |
          install -m 700 -d ~/.ssh
          echo "${{ secrets.CI_DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.CI_DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Diagnose (and optional safe cleanup)
        env:
          HOST: ${{ secrets.CI_DEPLOY_HOST }}
          USER: ${{ secrets.CI_DEPLOY_USER }}
          CLEAN: ${{ github.event.inputs.clean }}
          HARDEN: ${{ github.event.inputs.harden }}
          RECREATE: ${{ github.event.inputs.recreate }}
          SHOW_COMPOSE: ${{ github.event.inputs.show_compose }}
          APPLY_VM_OVERRIDE: ${{ github.event.inputs.apply_vm_override }}
          CHECK_ENV: ${{ github.event.inputs.check_env }}
          ROTATE_ESL: ${{ github.event.inputs.rotate_esl }}
          DIAG_ESL: ${{ github.event.inputs.diag_esl }}
          COMPOSE_APPLY: ${{ github.event.inputs.compose_apply }}
          AUDIT_NET: ${{ github.event.inputs.audit_net }}
          FIX_REDIS_BIND: ${{ github.event.inputs.fix_redis_bind }}
        run: |
          ssh -o IdentitiesOnly=yes "$USER@$HOST" bash -se -- "$CLEAN" "$HARDEN" "$RECREATE" "$SHOW_COMPOSE" "$APPLY_VM_OVERRIDE" "$CHECK_ENV" "$ROTATE_ESL" "$DIAG_ESL" "$COMPOSE_APPLY" "$AUDIT_NET" "$FIX_REDIS_BIND" <<'EOF'
          set -u
          CLEAN="${1:-no}"
          HARDEN="${2:-no}"
          RECREATE="${3:-no}"
          SHOW_COMPOSE="${4:-no}"
          APPLY_VM_OVERRIDE="${5:-no}"
          CHECK_ENV="${6:-no}"
          ROTATE_ESL="${7:-no}"
          DIAG_ESL="${8:-no}"
          COMPOSE_APPLY="${9:-no}"
          AUDIT_NET="${10:-no}"
          FIX_REDIS_BIND="${11:-no}"
          if [ "$FIX_REDIS_BIND" = "yes" ]; then
            echo "===== bind Redis to 127.0.0.1 ====="
            cd /root/sip-platform || { echo "no project dir"; exit 1; }
            cp -a docker-compose.yml docker-compose.yml.bak.redis
            # Replace the bare publish `- "6379"` with a loopback-only mapping.
            sed -i 's#^\([[:space:]]*\)- "6379"[[:space:]]*$#\1- "127.0.0.1:6379:6379"#' docker-compose.yml
            echo "redis ports lines now:"; grep -nE '6379' docker-compose.yml | head
            docker compose -p sip-platform up -d redis >/dev/null 2>&1
            sleep 8
            echo "-- public 32769 / redis listeners after --"
            ss -tlnH 2>/dev/null | awk '{print $4}' | grep -E ':32769|:6379' || echo "(no 0.0.0.0 redis listener — good)"
            echo "-- redis container + control-plane health --"
            docker ps --format '{{.Names}} {{.Status}}' | grep -E 'redis|control-plane'
            curl -s -o /dev/null -w 'healthz=%{http_code}\n' --max-time 5 http://127.0.0.1:8080/healthz || true
          fi
          if [ "$AUDIT_NET" = "yes" ]; then
            echo "===== network exposure (read-only) ====="
            echo "-- host LISTEN sockets (non-loopback are internet-reachable unless firewalled) --"
            ss -tlnH 2>/dev/null | awk '{print $4}' | sort -u || netstat -ltn 2>/dev/null
            echo "-- udp listeners --"
            ss -ulnH 2>/dev/null | awk '{print $4}' | sort -u | head -20 || true
            echo "-- ufw --"
            ufw status 2>/dev/null | head -20 || echo "(ufw not installed/active)"
            echo "-- iptables INPUT policy + rule count --"
            iptables -S INPUT 2>/dev/null | head -5 || echo "(no iptables access)"
            echo "-- public cloud firewall is Hetzner-side (not visible here) --"
          fi
          if [ "$COMPOSE_APPLY" = "yes" ]; then
            echo "===== docker compose up -d (apply synced override) ====="
            cd /root/sip-platform || { echo "no project dir"; exit 1; }
            docker compose -p sip-platform up -d --no-build
            sleep 10
            docker ps --format '{{.Names}}  {{.Status}}'
          fi
          if [ "$DIAG_ESL" = "yes" ]; then
            echo "===== ESL diagnosis (read-only) ====="
            echo "-- current control-plane ESL state (recent logs) --"
            docker logs --since 1200s sip-platform-control-plane-1 2>&1 | grep -iE "esl connected|esl connection lost" | tail -5 || echo "(no recent esl log lines)"
            echo "-- event_socket.conf.xml password param (on box) --"
            grep -i "password" /root/sip-platform/freeswitch/conf/autoload_configs/event_socket.conf.xml 2>/dev/null || echo "(not found)"
            echo "-- how FS resolves the expression (eval) --"
            docker exec sip-platform-freeswitch-1 fs_cli -x 'eval $${default_password_esl:-ClueCon}' 2>&1 | head -3 || echo "(fs_cli failed)"
            echo "-- global var default_password_esl --"
            docker exec sip-platform-freeswitch-1 fs_cli -x 'global_getvar default_password_esl' 2>&1 | head -3 || echo "(fs_cli failed)"
            echo "-- FS container healthcheck definition --"
            docker inspect sip-platform-freeswitch-1 --format '{{json .Config.Healthcheck}}' 2>&1 | head -3 || echo "(none)"
            echo "-- FS health log (last status) --"
            docker inspect sip-platform-freeswitch-1 --format '{{json .State.Health}}' 2>&1 | head -c 600; echo
            echo "-- candidate password-free probes (exit codes) --"
            docker exec sip-platform-freeswitch-1 sh -c 'pidof freeswitch >/dev/null 2>&1; echo "pidof freeswitch -> $?"; netstat -ltn 2>/dev/null | grep -q ":8021 "; echo "netstat :8021 -> $?"' 2>&1 | head -5 || echo "(exec failed)"
            echo "-- fs_cli config + liveness tools --"
            docker exec sip-platform-freeswitch-1 sh -c 'cat /etc/fs_cli.conf 2>/dev/null; cat /root/.fs_cli_conf 2>/dev/null; for t in nc pidof pgrep ss netstat bash; do command -v $t >/dev/null 2>&1 && echo "tool $t: yes"; done' 2>&1 | head -15 || echo "(exec failed)"
          fi
          if [ "$ROTATE_ESL" = "yes" ]; then
            echo "===== rotate ESL password (values never printed) ====="
            cd /root/sip-platform || { echo "no project dir"; exit 1; }
            escf=freeswitch/conf/autoload_configs/event_socket.conf.xml
            [ -f .env ] || { echo "no .env — abort"; exit 1; }
            [ -f "$escf" ] || { echo "no $escf — abort"; exit 1; }
            NEW=$(openssl rand -hex 24 2>/dev/null || (head -c24 /dev/urandom | od -An -tx1 | tr -d ' \n'))
            [ -n "$NEW" ] || { echo "could not generate secret — abort"; exit 1; }
            cp -a .env .env.bak.esl
            cp -a "$escf" "$escf.bak.esl"
            # .env: control-plane connects with this.
            if grep -qE '^ESL_PASSWORD=' .env; then
              sed -i "s|^ESL_PASSWORD=.*|ESL_PASSWORD=$NEW|" .env
            else
              printf 'ESL_PASSWORD=%s\n' "$NEW" >> .env
            fi
            # event_socket.conf.xml: set the literal listener password (no $${} var
            # indirection — FS's $${var:-default} expansion is unreliable).
            sed -i "s|<param name=\"password\" value=\"[^\"]*\"/>|<param name=\"password\" value=\"$NEW\"/>|" "$escf"
            echo "event_socket password param now: $(grep -c "name=\"password\" value=\"$NEW\"" "$escf") match(es)"
            echo "force-recreating FS + control-plane..."
            docker compose -p sip-platform up -d --force-recreate freeswitch control-plane >/dev/null 2>&1
            ok=0
            for i in $(seq 1 14); do
              sleep 10
              if docker logs --since 200s sip-platform-control-plane-1 2>&1 | grep -q "esl connected"; then ok=1; break; fi
            done
            hz=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 http://127.0.0.1:8080/healthz || echo 000)
            echo "esl_connected=$ok  healthz=$hz"
            echo "last esl log line:"; docker logs --since 200s sip-platform-control-plane-1 2>&1 | grep -iE "esl connected|esl connection lost" | tail -1 || true
            if [ "$ok" = "1" ] && [ "$hz" = "200" ]; then
              echo "ESL ROTATION OK — control-plane reconnected on the new password."
              rm -f .env.bak.esl "$escf.bak.esl"
            else
              echo "VERIFICATION FAILED — rolling back to previous ESL password."
              cp -a .env.bak.esl .env
              cp -a "$escf.bak.esl" "$escf"
              docker compose -p sip-platform up -d --force-recreate freeswitch control-plane >/dev/null 2>&1
              sleep 20
              echo "rolled back; healthz=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 http://127.0.0.1:8080/healthz || echo 000)"
            fi
          fi
          if [ "$CHECK_ENV" = "yes" ]; then
            echo "===== credential check (status only, NO values printed) ====="
            envf=/root/sip-platform/.env
            chk() {
              key="$1"; def="$2"
              line=$(grep -E "^${key}=" "$envf" 2>/dev/null | head -1)
              val="${line#*=}"
              if [ -z "$line" ]; then
                echo "  $key: NOT set in .env -> container falls back to compose default ('$def')  <-- WEAK"
              elif [ "$val" = "$def" ]; then
                echo "  $key: set to the well-known default ('$def')  <-- WEAK"
              else
                echo "  $key: overridden with a non-default value (len ${#val})  OK"
              fi
            }
            if [ -f "$envf" ]; then
              chk POSTGRES_PASSWORD sip_dev
              chk ESL_PASSWORD ClueCon
            else
              echo "  (.env not found at $envf — compose defaults would apply)"
            fi
          fi
          if [ "$SHOW_COMPOSE" = "yes" ]; then
            echo "===== BEGIN on-box docker-compose.yml ====="
            # Verbatim: the compose file contains no literal secrets — only
            # ${VAR}/${VAR:-default} references (defaults are the public dev
            # values) and file paths. Needed byte-exact for the base-compose
            # cutover. A guard refuses to print if any non-${ assignment to a
            # secret-like key is found (would indicate an unexpected literal).
            if grep -nE '(PASSWORD|SECRET|TOKEN|_KEY)[A-Za-z_]*[[:space:]]*[:=][[:space:]]*[^$#/[:space:]]' /root/sip-platform/docker-compose.yml >/dev/null 2>&1; then
              echo "REFUSING: a literal secret-like value was found; not printing."
            else
              cat /root/sip-platform/docker-compose.yml 2>/dev/null || echo "(missing)"
            fi
            echo "===== END on-box docker-compose.yml ====="
          fi
          if [ "$APPLY_VM_OVERRIDE" = "yes" ]; then
            echo "===== APPLY freeswitch_storage override ====="
            cd /root/sip-platform || { echo "no /root/sip-platform"; exit 1; }
            if [ -e docker-compose.override.yml ]; then
              echo "docker-compose.override.yml already exists — not clobbering:"
              cat docker-compose.override.yml
            else
              printf '%s\n' \
                'services:' \
                '  freeswitch:' \
                '    volumes:' \
                '      - freeswitch_storage:/var/lib/freeswitch/storage' \
                '  control-plane:' \
                '    volumes:' \
                '      - freeswitch_storage:/var/lib/freeswitch/storage:ro' \
                'volumes:' \
                '  freeswitch_storage:' \
                > docker-compose.override.yml
              echo "wrote docker-compose.override.yml:"; cat docker-compose.override.yml
              if docker compose -p sip-platform config >/dev/null; then
                echo "compose config valid; applying..."
                docker compose -p sip-platform up -d --no-build
                sleep 6
                echo "----- control-plane storage mounts -----"
                docker inspect --format '{{range .Mounts}}{{.Source}} -> {{.Destination}}{{println}}{{end}}' sip-platform-control-plane-1 2>/dev/null | grep -i storage || echo "(storage mount NOT found)"
              else
                echo "compose config INVALID — reverting override"; rm -f docker-compose.override.yml
              fi
            fi
          fi
          echo "===== containers (id -> name) ====="
          docker ps -a --format '{{.ID}}  {{.Names}}  {{.Image}}  ({{.Status}})' 2>/dev/null || true
          echo "===== recent logs of restarting/unhealthy containers ====="
          for c in $(docker ps -a --format '{{.Names}} {{.Status}}' 2>/dev/null | grep -iE 'restart|unhealthy' | awk '{print $1}'); do
            echo "----- last 40 lines: $c -----"
            docker logs --tail 40 "$c" 2>&1 | tail -40 || true
          done
          echo "===== df / ====="
          df -h /
          echo "===== top /var/* ====="
          du -shx /var/* 2>/dev/null | sort -h | tail -15
          echo "===== top /var/lib/docker/* ====="
          du -shx /var/lib/docker/* 2>/dev/null | sort -h | tail -15
          echo "===== docker volumes ====="
          du -shx /var/lib/docker/volumes/* 2>/dev/null | sort -h | tail -15
          echo "===== docker system df ====="
          docker system df 2>/dev/null || true
          echo "===== systemd journal ====="
          journalctl --disk-usage 2>/dev/null || true
          echo "===== 20 biggest files under /var ====="
          find /var -xdev -type f -printf '%s %p\n' 2>/dev/null | sort -rn | head -20 \
            | awk '{ printf "%8.0f MB  %s\n", $1/1048576, $2 }'
          echo "===== /root /tmp ====="
          du -shx /root /tmp 2>/dev/null || true
          echo "===== /var/backups/postgres ====="
          ls -lhS /var/backups/postgres/ 2>/dev/null | head || echo "(none)"

          if [ "$CLEAN" = "yes" ]; then
            echo "===== SAFE CLEANUP ====="
            journalctl --vacuum-size=150M 2>/dev/null || true
            apt-get clean 2>/dev/null || true
            for c in $(docker ps -aq 2>/dev/null); do
              lp=$(docker inspect --format='{{.LogPath}}' "$c" 2>/dev/null || true)
              if [ -n "${lp:-}" ] && [ -f "$lp" ]; then
                truncate -s 0 "$lp" && echo "truncated container log: $c"
              fi
            done
            echo "===== df / after cleanup ====="
            df -h /
          fi

          if [ "$HARDEN" = "yes" ]; then
            echo "===== HARDEN: docker log limits ====="
            if [ -e /etc/docker/daemon.json ]; then
              echo "daemon.json already exists — leaving it alone (merge manually):"
              cat /etc/docker/daemon.json
            else
              mkdir -p /etc/docker
              printf '%s\n' '{' '  "log-driver": "json-file",' '  "log-opts": { "max-size": "50m", "max-file": "3" }' '}' > /etc/docker/daemon.json
              echo "wrote /etc/docker/daemon.json:"; cat /etc/docker/daemon.json
              systemctl restart docker && echo "docker restarted with global log limits"
            fi
          fi

          if [ "$RECREATE" = "yes" ]; then
            echo "===== RECREATE: adopt log caps on all containers ====="
            cd /root/sip-platform || { echo "no /root/sip-platform"; exit 1; }
            docker compose -p sip-platform up -d --force-recreate --no-build
            sleep 8
            echo "----- container status -----"
            docker ps -a --format '{{.Names}}  ({{.Status}})'
            echo "----- effective log config per container -----"
            for c in $(docker ps -a --format '{{.Names}}'); do
              printf '%s  ' "$c"
              docker inspect --format '{{.HostConfig.LogConfig.Type}} {{.HostConfig.LogConfig.Config}}' "$c" 2>/dev/null || echo "?"
            done
          fi
          echo "===== DONE ====="
          true
          EOF
