name: Ops · disk

# Manually-triggered disk diagnosis + safe cleanup for the Hetzner box.
# Uses the same SSH secrets the deploy job already uses — no console, no new
# key. Run with clean=no first to see the breakdown; then clean=yes to apply
# the non-destructive cleanups (systemd journal vacuum, container log
# truncation, apt cache). It never touches Postgres data, named volumes, or
# /var/backups — those are surfaced for a human to decide on.
on:
  workflow_dispatch:
    inputs:
      clean:
        description: "Type 'yes' to run safe cleanups (journal/container-logs/apt). Default diagnoses only."
        required: false
        default: "no"
      harden:
        description: "Type 'yes' to install a global Docker log-size limit (50m x3) and restart docker."
        required: false
        default: "no"
      recreate:
        description: "Type 'yes' to force-recreate all compose containers so they adopt the log cap (brief downtime)."
        required: false
        default: "no"
      show_compose:
        description: "Type 'yes' to print the on-box docker-compose.yml (to diff against the repo)."
        required: false
        default: "no"
      apply_vm_override:
        description: "Type 'yes' to add the freeswitch_storage volume via docker-compose.override.yml (fixes voicemail recordings on prod)."
        required: false
        default: "no"

jobs:
  disk:
    runs-on: ubuntu-latest
    concurrency:
      # Share the deploy lock so this never races a deploy on the box.
      group: deploy-hetzner
      cancel-in-progress: false
    steps:
      - name: Install SSH key
        run: |
          install -m 700 -d ~/.ssh
          echo "${{ secrets.CI_DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.CI_DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Diagnose (and optional safe cleanup)
        env:
          HOST: ${{ secrets.CI_DEPLOY_HOST }}
          USER: ${{ secrets.CI_DEPLOY_USER }}
          CLEAN: ${{ github.event.inputs.clean }}
          HARDEN: ${{ github.event.inputs.harden }}
          RECREATE: ${{ github.event.inputs.recreate }}
          SHOW_COMPOSE: ${{ github.event.inputs.show_compose }}
          APPLY_VM_OVERRIDE: ${{ github.event.inputs.apply_vm_override }}
        run: |
          ssh -o IdentitiesOnly=yes "$USER@$HOST" bash -se -- "$CLEAN" "$HARDEN" "$RECREATE" "$SHOW_COMPOSE" "$APPLY_VM_OVERRIDE" <<'EOF'
          set -u
          CLEAN="${1:-no}"
          HARDEN="${2:-no}"
          RECREATE="${3:-no}"
          SHOW_COMPOSE="${4:-no}"
          APPLY_VM_OVERRIDE="${5:-no}"
          if [ "$SHOW_COMPOSE" = "yes" ]; then
            echo "===== BEGIN on-box docker-compose.yml ====="
            # Mask only literal secret values (key contains PASSWORD/SECRET/TOKEN/KEY
            # followed by : or = and a value NOT starting with $). ${VAR} refs and
            # file paths are preserved so the structure is reviewable.
            sed -E 's/((PASSWORD|SECRET|TOKEN|_KEY)[A-Za-z_]*[[:space:]]*[:=][[:space:]]*)([^$].*)/\1<redacted>/I' /root/sip-platform/docker-compose.yml 2>/dev/null || echo "(missing)"
            echo "===== END on-box docker-compose.yml ====="
          fi
          if [ "$APPLY_VM_OVERRIDE" = "yes" ]; then
            echo "===== APPLY freeswitch_storage override ====="
            cd /root/sip-platform || { echo "no /root/sip-platform"; exit 1; }
            if [ -e docker-compose.override.yml ]; then
              echo "docker-compose.override.yml already exists — not clobbering:"
              cat docker-compose.override.yml
            else
              printf '%s\n' \
                'services:' \
                '  freeswitch:' \
                '    volumes:' \
                '      - freeswitch_storage:/var/lib/freeswitch/storage' \
                '  control-plane:' \
                '    volumes:' \
                '      - freeswitch_storage:/var/lib/freeswitch/storage:ro' \
                'volumes:' \
                '  freeswitch_storage:' \
                > docker-compose.override.yml
              echo "wrote docker-compose.override.yml:"; cat docker-compose.override.yml
              if docker compose -p sip-platform config >/dev/null; then
                echo "compose config valid; applying..."
                docker compose -p sip-platform up -d --no-build
                sleep 6
                echo "----- control-plane storage mounts -----"
                docker inspect --format '{{range .Mounts}}{{.Source}} -> {{.Destination}}{{println}}{{end}}' sip-platform-control-plane-1 2>/dev/null | grep -i storage || echo "(storage mount NOT found)"
              else
                echo "compose config INVALID — reverting override"; rm -f docker-compose.override.yml
              fi
            fi
          fi
          echo "===== containers (id -> name) ====="
          docker ps -a --format '{{.ID}}  {{.Names}}  {{.Image}}  ({{.Status}})' 2>/dev/null || true
          echo "===== recent logs of restarting/unhealthy containers ====="
          for c in $(docker ps -a --format '{{.Names}} {{.Status}}' 2>/dev/null | grep -iE 'restart|unhealthy' | awk '{print $1}'); do
            echo "----- last 40 lines: $c -----"
            docker logs --tail 40 "$c" 2>&1 | tail -40 || true
          done
          echo "===== df / ====="
          df -h /
          echo "===== top /var/* ====="
          du -shx /var/* 2>/dev/null | sort -h | tail -15
          echo "===== top /var/lib/docker/* ====="
          du -shx /var/lib/docker/* 2>/dev/null | sort -h | tail -15
          echo "===== docker volumes ====="
          du -shx /var/lib/docker/volumes/* 2>/dev/null | sort -h | tail -15
          echo "===== docker system df ====="
          docker system df 2>/dev/null || true
          echo "===== systemd journal ====="
          journalctl --disk-usage 2>/dev/null || true
          echo "===== 20 biggest files under /var ====="
          find /var -xdev -type f -printf '%s %p\n' 2>/dev/null | sort -rn | head -20 \
            | awk '{ printf "%8.0f MB  %s\n", $1/1048576, $2 }'
          echo "===== /root /tmp ====="
          du -shx /root /tmp 2>/dev/null || true
          echo "===== /var/backups/postgres ====="
          ls -lhS /var/backups/postgres/ 2>/dev/null | head || echo "(none)"

          if [ "$CLEAN" = "yes" ]; then
            echo "===== SAFE CLEANUP ====="
            journalctl --vacuum-size=150M 2>/dev/null || true
            apt-get clean 2>/dev/null || true
            for c in $(docker ps -aq 2>/dev/null); do
              lp=$(docker inspect --format='{{.LogPath}}' "$c" 2>/dev/null || true)
              if [ -n "${lp:-}" ] && [ -f "$lp" ]; then
                truncate -s 0 "$lp" && echo "truncated container log: $c"
              fi
            done
            echo "===== df / after cleanup ====="
            df -h /
          fi

          if [ "$HARDEN" = "yes" ]; then
            echo "===== HARDEN: docker log limits ====="
            if [ -e /etc/docker/daemon.json ]; then
              echo "daemon.json already exists — leaving it alone (merge manually):"
              cat /etc/docker/daemon.json
            else
              mkdir -p /etc/docker
              printf '%s\n' '{' '  "log-driver": "json-file",' '  "log-opts": { "max-size": "50m", "max-file": "3" }' '}' > /etc/docker/daemon.json
              echo "wrote /etc/docker/daemon.json:"; cat /etc/docker/daemon.json
              systemctl restart docker && echo "docker restarted with global log limits"
            fi
          fi

          if [ "$RECREATE" = "yes" ]; then
            echo "===== RECREATE: adopt log caps on all containers ====="
            cd /root/sip-platform || { echo "no /root/sip-platform"; exit 1; }
            docker compose -p sip-platform up -d --force-recreate --no-build
            sleep 8
            echo "----- container status -----"
            docker ps -a --format '{{.Names}}  ({{.Status}})'
            echo "----- effective log config per container -----"
            for c in $(docker ps -a --format '{{.Names}}'); do
              printf '%s  ' "$c"
              docker inspect --format '{{.HostConfig.LogConfig.Type}} {{.HostConfig.LogConfig.Config}}' "$c" 2>/dev/null || echo "?"
            done
          fi
          echo "===== DONE ====="
          true
          EOF
