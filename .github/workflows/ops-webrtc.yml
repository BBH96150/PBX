name: Ops · webrtc media

# Phase 2 (live WebRTC PTT) operations over the deploy SSH key.
#  - inspect: pull the rtpengine image + show its entrypoint/cmd + --help, so we
#    configure the compose service correctly (read-only-ish: pulls an image).
#  - up: bring up the rtpengine service (docker compose up -d rtpengine) — CI
#    doesn't start new containers, so this is how it first launches.
#  - verify: show rtpengine logs + ng-protocol reachability from Kamailio.
on:
  workflow_dispatch:
    inputs:
      inspect:
        description: "Type 'yes' to pull + inspect the rtpengine image."
        required: false
        default: "no"
      up:
        description: "Type 'yes' to docker compose up -d rtpengine."
        required: false
        default: "no"
      verify:
        description: "Type 'yes' to show rtpengine logs + ng reachability."
        required: false
        default: "no"
      kamcheck:
        description: "Type 'yes' to check rtpengine.so in the kamailio image + parse the current config."
        required: false
        default: "no"
      kamsync:
        description: "Type 'yes' to ship the repo kamailio.cfg to the box + parse-check it (NO restart)."
        required: false
        default: "no"
      kamrestart:
        description: "Type 'yes' to restart kamailio (PRODUCTION: briefly drops registrations)."
        required: false
        default: "no"

jobs:
  webrtc:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-hetzner
      cancel-in-progress: false
    env:
      DIR: /root/sip-platform
    steps:
      - uses: actions/checkout@v4

      - name: Install SSH key
        run: |
          install -m 700 -d ~/.ssh
          echo "${{ secrets.CI_DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.CI_DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync + parse-check kamailio.cfg (no restart)
        if: ${{ github.event.inputs.kamsync == 'yes' }}
        env:
          HOST: ${{ secrets.CI_DEPLOY_HOST }}
          USER: ${{ secrets.CI_DEPLOY_USER }}
        run: |
          set -e
          echo "--- shipping kamailio.cfg ---"
          scp -o IdentitiesOnly=yes kamailio/etc/kamailio.cfg "$USER@$HOST:$DIR/kamailio/etc/kamailio.cfg"
          echo "--- injecting real DBURL from the kamailio container env (repo keeps a placeholder; secret stays on the box) + parse-check ---"
          ssh -o IdentitiesOnly=yes "$USER@$HOST" bash -se -- "$DIR" <<'EOF'
          set -u
          DIR="${1:-/root/sip-platform}"
          KC=sip-platform-kamailio-1
          DBU=$(docker inspect "$KC" --format '{{range .Config.Env}}{{println .}}{{end}}' 2>/dev/null | sed -n 's/^DB_URL=//p' | head -1)
          if [ -n "$DBU" ]; then
            sed -i "s|^#!define DBURL .*|#!define DBURL \"$DBU\"|" "$DIR/kamailio/etc/kamailio.cfg"
            echo "DBURL injected from env (value not shown)"
          else
            echo "WARN: DB_URL env not found on kamailio container — config left as-is"
          fi
          echo "--- parse-check (running kamailio keeps its loaded config; this only validates) ---"
          docker exec "$KC" kamailio -c -f /etc/kamailio/kamailio.cfg 2>&1 | tail -8
          EOF

      - name: Restart kamailio (production)
        if: ${{ github.event.inputs.kamrestart == 'yes' }}
        env:
          HOST: ${{ secrets.CI_DEPLOY_HOST }}
          USER: ${{ secrets.CI_DEPLOY_USER }}
        run: |
          ssh -o IdentitiesOnly=yes "$USER@$HOST" bash -se -- "$DIR" <<'EOF'
          set -u
          DIR="${1:-/root/sip-platform}"
          KC=sip-platform-kamailio-1
          echo "--- restarting kamailio ---"
          cd "$DIR" && docker compose -p sip-platform restart kamailio 2>&1 | tail -5
          sleep 4
          echo "--- kamailio up? ---"
          docker ps --filter name=kamailio --format '{{.Names}}  {{.Status}}'
          echo "--- rtpengine module loaded + no startup errors? ---"
          docker logs --tail 15 "$KC" 2>&1 | grep -iE "rtpengine|error|critical|listening" | head -15 || true
          echo "--- registrations recovering (count) ---"
          PG=sip-platform-postgres-1
          PGUSER=$(docker exec "$PG" printenv POSTGRES_USER 2>/dev/null); PGUSER=${PGUSER:-sip}
          PGDB=$(docker exec "$PG" printenv POSTGRES_DB 2>/dev/null); PGDB=${PGDB:-sipplatform}
          docker exec "$PG" psql -U "$PGUSER" -d "$PGDB" -tAc "SELECT count(*) FROM location;" 2>&1 || true
          echo "--- done ---"
          EOF

      - name: Ops
        env:
          HOST: ${{ secrets.CI_DEPLOY_HOST }}
          USER: ${{ secrets.CI_DEPLOY_USER }}
          INSPECT: ${{ github.event.inputs.inspect }}
          UP: ${{ github.event.inputs.up }}
          VERIFY: ${{ github.event.inputs.verify }}
          KAMCHECK: ${{ github.event.inputs.kamcheck }}
        run: |
          ssh -o IdentitiesOnly=yes "$USER@$HOST" bash -se -- "$INSPECT" "$UP" "$VERIFY" "$DIR" "$KAMCHECK" <<'EOF'
          set -u
          INSPECT="${1:-no}"; UP="${2:-no}"; VERIFY="${3:-no}"; DIR="${4:-/root/sip-platform}"; KAMCHECK="${5:-no}"
          IMG=drachtio/rtpengine:latest

          if [ "$KAMCHECK" = "yes" ]; then
            KC=sip-platform-kamailio-1
            echo "===== rtpengine.so present in kamailio container? ====="
            docker exec "$KC" sh -c 'ls -1 $(kamailio -V 2>/dev/null | grep -oE "/[^ ]*modules" | head -1)/rtpengine.so 2>/dev/null || find / -name rtpengine.so 2>/dev/null | head' 2>&1
            echo "===== kamailio version ====="
            docker exec "$KC" kamailio -v 2>&1 | head -3
            echo "===== parse CURRENT config (baseline; expect 'config file ok') ====="
            docker exec "$KC" kamailio -c -f /etc/kamailio/kamailio.cfg 2>&1 | tail -8
          fi

          if [ "$INSPECT" = "yes" ]; then
            echo "===== pull $IMG ====="; docker pull "$IMG" 2>&1 | tail -3
            echo "===== entrypoint / cmd ====="
            docker inspect --format 'ENTRYPOINT={{json .Config.Entrypoint}} CMD={{json .Config.Cmd}}' "$IMG" 2>&1
            echo "===== rtpengine --help (first 60 lines) ====="
            docker run --rm --entrypoint rtpengine "$IMG" --help 2>&1 | head -60 || \
              docker run --rm "$IMG" --help 2>&1 | head -60 || echo "(--help failed both ways)"
          fi

          if [ "$UP" = "yes" ]; then
            echo "===== compose config for rtpengine ====="
            cd "$DIR" && docker compose -p sip-platform config 2>&1 | sed -n '/rtpengine/,/^[a-z]/p' | head -40
            echo "===== up -d rtpengine ====="
            cd "$DIR" && docker compose -p sip-platform up -d rtpengine 2>&1 | tail -20
          fi

          if [ "$VERIFY" = "yes" ]; then
            echo "===== rtpengine container ====="
            docker ps --filter name=rtpengine --format '{{.Names}}  {{.Status}}  {{.Ports}}' 2>&1
            echo "===== rtpengine logs (last 25) ====="
            docker logs --tail 25 sip-platform-rtpengine-1 2>&1 || docker logs --tail 25 $(docker ps -qf name=rtpengine) 2>&1
            echo "===== ng reachability from kamailio (expect a bencoded pong) ====="
            # rtpengine ng 'ping' = bencode d...e; send a minimal ping cookie via nc from the kamailio container.
            docker exec sip-platform-kamailio-1 sh -c 'printf "%s" "pingtest_ d7:command4:pinge" | timeout 2 nc -u -w1 rtpengine 22222' 2>&1 | head -c 200 || echo "(nc unavailable or no reply)"
            echo
          fi
          echo "===== done ====="
          EOF
