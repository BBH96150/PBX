name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

env:
  GO_VERSION: "1.25"
  IMAGE: ghcr.io/bbh96150/pbx/control-plane

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: control-plane/go.sum
      - name: go vet
        working-directory: control-plane
        run: go vet ./...
      - uses: golangci/golangci-lint-action@v7
        with:
          # v2.4.0+ is built with Go 1.25 toolchain — required since our
          # go.mod targets 1.25. golangci-lint v2 requires action v7.
          version: v2.4.0
          working-directory: control-plane
          args: --timeout=5m

  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: control-plane/go.sum
      - name: go build
        working-directory: control-plane
        run: go build ./...
      - name: go test
        working-directory: control-plane
        run: go test -race -count=1 ./...

  migrations:
    name: Migrations apply cleanly
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sip
          POSTGRES_PASSWORD: sip
          POSTGRES_DB: sipplatform
        ports:
          - 5432:5432
        options: >-
          --health-cmd=pg_isready
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - name: migrate up
        run: |
          docker run --rm --network=host \
            -v "$PWD/db/migrations:/migrations:ro" \
            migrate/migrate:latest \
            -path=/migrations \
            -database="postgres://sip:sip@127.0.0.1:5432/sipplatform?sslmode=disable" \
            up

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: control-plane/go.sum
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: scan
        working-directory: control-plane
        run: govulncheck ./...

  docker:
    name: Docker (multi-arch)
    runs-on: ubuntu-latest
    needs: [lint, test, migrations]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: control-plane
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      # Serialize deploys — only one Hetzner deploy at a time. Newer
      # main pushes wait, no cancellation (we want every shipped commit
      # to actually land on the box).
      group: deploy-hetzner
      cancel-in-progress: false
    steps:
      - name: Install SSH key
        run: |
          install -m 700 -d ~/.ssh
          echo "${{ secrets.CI_DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.CI_DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pull image, run migrations, restart control-plane
        env:
          HOST: ${{ secrets.CI_DEPLOY_HOST }}
          USER: ${{ secrets.CI_DEPLOY_USER }}
        run: |
          ssh -o IdentitiesOnly=yes "$USER@$HOST" bash -se <<'EOF'
          set -euo pipefail
          cd /root/sip-platform
          echo "::group::pull"
          docker compose -p sip-platform pull control-plane
          echo "::endgroup::"
          echo "::group::migrate"
          docker compose -p sip-platform --profile tools run --rm migrate up
          echo "::endgroup::"
          echo "::group::restart"
          docker compose -p sip-platform up -d --no-build control-plane
          echo "::endgroup::"
          # Trim old image layers; keep the last 3 of our image.
          docker image prune -f --filter "label=org.opencontainers.image.source=https://github.com/BBH96150/PBX" >/dev/null || true
          EOF

      - name: Smoke check
        env:
          HOST: ${{ secrets.CI_DEPLOY_HOST }}
        run: |
          for i in 1 2 3 4 5 6; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 5 "http://$HOST:8080/healthz" || echo 000)
            if [ "$code" = "200" ]; then
              echo "Portal healthy after $i attempt(s)."
              exit 0
            fi
            echo "attempt $i: HTTP $code; retrying in 3s"
            sleep 3
          done
          echo "Portal never returned 200 after restart." >&2
          exit 1
