          type: object
          description: Event-specific payload; see x-webhook-events.

x-webhook-events:
  description: |
    Outbound webhooks are configured per tenant in the portal. Each endpoint
    has an HTTPS URL, a generated signing secret, and an optional event
    subscription list (empty = all events). Delivery is best-effort with a 6s
    timeout; redirects are not followed; only public HTTPS URLs are allowed.

    Each delivery is an HTTP POST with a JSON body:
      { "event": "<event>", "sent_at": "<RFC3339>", "data": { ... } }

    Headers:
      - X-Webhook-Event: <event name>
      - X-Webhook-Id: <endpoint uuid>
      - X-Webhook-Signature: sha256=<hex>
          HMAC-SHA256 of the raw request body using the endpoint's signing
          secret. Verify with constant-time comparison:
            expected = "sha256=" + hex(hmac_sha256(secret, raw_body))
  signatureHeader: X-Webhook-Signature
  algorithm: HMAC-SHA256
  events:
    call.completed:
      summary: A call finished and its CDR was written.
      payload:
        type: object
        properties:
          call_uuid:
            type: string
          direction:
            type: string
            enum: [inbound, outbound, internal]
          from:
            type: string
          to:
            type: string
          caller_id_num:
            type: string
          caller_id_name:
            type: string
          started_at:
            type: string
            format: date-time
          duration_sec:
            type: integer
          billable_sec:
            type: integer
          disposition:
            type: string
          hangup_cause:
            type: string
    trunk.down:
      summary: A carrier trunk/gateway transitioned to a down state.
      payload:
        type: object
        properties:
          trunk:
            type: string
          carrier:
            type: string
          gateway:
            type: string
          prev_state:
            type: string
          state:
            type: string
    trunk.up:
      summary: A carrier trunk/gateway recovered.
      payload:
        type: object
        properties:
          trunk:
            type: string
          carrier:
            type: string
          gateway:
            type: string
          prev_state:
            type: string
          state:
            type: string
    voicemail.new:
      summary: A new voicemail message was left.
      payload:
        type: object
        properties:
          extension_id:
            type: string
            format: uuid
          user:
            type: string
          domain:
            type: string
          caller_id_num:
            type: string
          caller_id_name:
            type: string
          duration_sec:
            type: integer
    test.ping:
      summary: Test delivery fired from the portal's "Send test" button.
      payload:
        type: object
