# Production compose OVERRIDE layer.
#
# The ci.yml deploy job rsyncs this file to the box as
# `docker-compose.override.yml`, which Docker Compose auto-merges on top of the
# box's base `docker-compose.yml`.
#
# IMPORTANT: the base `docker-compose.yml` ON THE BOX is hand-maintained and
# has diverged from this repo's base (it uses `image:` instead of `build:`,
# file-mounted SAML certs, an always-on Caddy, a different redis port binding,
# and predates SIP_DOMAIN_SUFFIX / fs-gateways-init). So we do NOT sync the base
# — syncing it would break prod. Only put ADDITIVE, prod-safe deltas here.
#
# Compose merges service `volumes:` additively, so these mounts are appended to
# whatever the base already defines.

services:
  freeswitch:
    # Voicemail recordings live under storage_dir; share so the control-plane
    # can stream them in the portal inbox and attach them to VM-to-email.
    volumes:
      - freeswitch_storage:/var/lib/freeswitch/storage
    # The image's default /healthcheck.sh authenticates to ESL via fs_cli, so it
    # reports "unhealthy" whenever the ESL password is rotated away from the
    # default. Replace it with a password-free readiness probe: ESL port 8021
    # accepting a TCP connection means FreeSWITCH is up.
    healthcheck:
      # BusyBox nc has no -z; use netstat to confirm the ESL port is listening
      # (password-free readiness signal — proven on the box).
      test: ["CMD-SHELL", "netstat -ltn 2>/dev/null | grep -q ':8021 ' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
  control-plane:
    volumes:
      - freeswitch_storage:/var/lib/freeswitch/storage:ro
      # Call recording playback + paging broadcast. Read recordings for the CDR
      # viewer, and WRITE recorded-page (voice-blast) WAVs under <root>/blasts/
      # which FreeSWITCH then plays to paging-group members. Same volume + same
      # mount path on both containers, so the path the control-plane writes is
      # exactly the path FS plays back. (Was :ro; now rw for blast writes.)
      - freeswitch_recordings:/var/lib/freeswitch/recordings

  # Phase 2 (live WebRTC PTT): RTPEngine bridges browser WebRTC media
  # (DTLS-SRTP / ICE / rtcp-mux) ↔ plain RTP toward FreeSWITCH, so audio from a
  # browser actually reaches the media server. Kamailio drives it over the ng
  # control protocol (rtpengine:22222) and only for WS/WSS legs — desk-phone
  # (UDP/TCP) calls never touch it. Userspace forwarding (no kernel module).
  #
  # On the same Docker network as Kamailio (reachable as `rtpengine`); the RTP
  # range is published 1:1 so the advertised public IP:port reaches the
  # container. Set MEDIA_PUBLIC_IP in the box .env to the server's public IP.
  rtpengine:
    image: drachtio/rtpengine:latest
    restart: unless-stopped
    # rtpengine rejects 0.0.0.0 as an interface; bind the container's own IP and
    # advertise the public IP for ICE/SDP. $$ escapes $ so Compose passes the
    # shell substitution through to the container.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'exec rtpengine --interface=$$(hostname -i)!${MEDIA_PUBLIC_IP:-5.78.207.2} --listen-ng=0.0.0.0:22222 --port-min=30000 --port-max=30100 --log-level=5 --log-stderr --foreground'
    ports:
      - "30000-30100:30000-30100/udp"

volumes:
  freeswitch_storage:
  freeswitch_recordings:
