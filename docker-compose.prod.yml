# Production compose OVERRIDE layer.
#
# The ci.yml deploy job rsyncs this file to the box as
# `docker-compose.override.yml`, which Docker Compose auto-merges on top of the
# box's base `docker-compose.yml`.
#
# IMPORTANT: the base `docker-compose.yml` ON THE BOX is hand-maintained and
# has diverged from this repo's base (it uses `image:` instead of `build:`,
# file-mounted SAML certs, an always-on Caddy, a different redis port binding,
# and predates SIP_DOMAIN_SUFFIX / fs-gateways-init). So we do NOT sync the base
# — syncing it would break prod. Only put ADDITIVE, prod-safe deltas here.
#
# Compose merges service `volumes:` additively, so these mounts are appended to
# whatever the base already defines.

services:
  freeswitch:
    # Voicemail recordings live under storage_dir; share so the control-plane
    # can stream them in the portal inbox and attach them to VM-to-email.
    volumes:
      - freeswitch_storage:/var/lib/freeswitch/storage
    # The image's default /healthcheck.sh authenticates to ESL via fs_cli, so it
    # reports "unhealthy" whenever the ESL password is rotated away from the
    # default. Replace it with a password-free readiness probe: ESL port 8021
    # accepting a TCP connection means FreeSWITCH is up.
    healthcheck:
      # BusyBox nc has no -z; use netstat to confirm the ESL port is listening
      # (password-free readiness signal — proven on the box).
      test: ["CMD-SHELL", "netstat -ltn 2>/dev/null | grep -q ':8021 ' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
  control-plane:
    volumes:
      - freeswitch_storage:/var/lib/freeswitch/storage:ro

volumes:
  freeswitch_storage:
